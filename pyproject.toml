[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "capper"
version = "0.1.0"
description = "Semantic, typed wrappers for Faker with automatic Polyfactory integration"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "Faker>=20.0",
    "Polyfactory>=2.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[project.urls]
Documentation = "https://github.com/yourusername/capper#readme"
Repository = "https://github.com/yourusername/capper"

[tool.setuptools.packages.find]
where = ["."]
include = ["capper*"]

[tool.pytest.ini_options]
testpaths = ["capper/tests"]
pythonpath = ["."]
