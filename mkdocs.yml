site_name: Capper
site_description: Semantic, typed wrappers for Faker with automatic Polyfactory integration.
site_url: https://github.com/eddiethedean/capper

theme:
  name: readthedocs

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: false
            docstring_style: google

nav:
  - Home: README.md
  - Package plan: capper_package_plan.md
  - Roadmap: ROADMAP.md
  - Benchmarks: benchmarks.md
  - Faker providers: FAKER_PROVIDERS.md
  - Compatibility: compatibility.md
  - Extending Capper: extending.md
  - User guides:
      - Getting started: user_guides/getting_started.md
      - Models and factories: user_guides/models_and_factories.md
      - Reproducible data: user_guides/reproducible_data.md
      - Custom types: user_guides/custom_types.md
      - FastAPI + Pydantic: user_guides/fastapi_pydantic.md
      - Django patterns: user_guides/django_patterns.md
      - Dataclasses and attrs: user_guides/dataclasses_and_attrs.md
      - Test setup templates: user_guides/test_setup_templates.md
      - Project structure: user_guides/project_structure.md
  - Example notebooks: notebooks/README.md
  - API Reference: api.md

markdown_extensions:
  - pymdownx.superfences
